

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }

      nav {
        padding: 6px;
      }

      ul {
        list-style: none;
        margin-top: 8px;
      }

      li {
        display: inline;
        padding: 10px;
      }

      li a {
        color: white;
        text-decoration: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 20px;
      }

      .copybtn {
        background-color: blue;
        color: white;
        border: none;
        outline: none;
        width: 100%;
        height: 80px;
      }

      .card :hover {
        background-color: rgb(14, 19, 143);
      }

      .line {
        border-bottom: 4px solid red;
      }

      .container-fluid {
        padding-top: 90px;
      }
    </style>
  </head>
  <body>
    <nav class="bg-primary fixed-top">
      <ul>
        <li><a href="./index.html">NHL</a></li>
        <li class="line"><a href="./nba.html">NBA</a></li>
        <li><a href="./mlb.html">MLB </a></li>
        <li><a href="./boxing.html">BOXING </a></li>
        <li><a href="./mma.html">MMA </a></li>
      </ul>
    </nav>

    <div class="container-fluid"></div>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js" integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>
    <script>
      let display = document.querySelector(".container-fluid");
      let i;
      for (i = 1; i <= 15; i++) {
        display.innerHTML += `
            <div class="card "  id="dis${i}">
            <button class="copybtn bg-secondary" onclick="copy(${i})">NBA ${i}</button>
        </div>
        <br id="bbr${i}">`;        

        function copy(cid) {
          let url = "http://www.prostreamhd.online/p/nba" + cid + ".html";

        


          navigator.clipboard.writeText(url);
        }
      }
    </script>
    <script>
        $('a').mouseenter(function(){
    $(this).css('color', 'rgb(186, 186, 186)')
})

$('a').mouseleave(function(){
    $(this).css('color', 'white')
})

$('button').click(function(){
    $(this).addClass('bg-danger')
})


$('button').mouseenter(function(){
    $(this).removeClass('bg-secondary')
    $(this).addClass('bg-primary')
})

$('button').mouseleave(function(){
    $(this).addClass('bg-secondary')
    $(this).removeClass('bg-primary')
})
    </script>
  </body>
</html>
