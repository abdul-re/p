<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
</head>
<body>
    
    <textarea  rows="4" cols="50" id="auto">
    </textarea>
<button onclick="test()">Generate</button>

<div id="none" style="display: none;">.</div>


<div id="display"></div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js" integrity="sha256-2Pmvv0kuTBOenSvLm6bvfBSSHrUJ+3A7x6P5Ebd07/g=" crossorigin="anonymous"></script>
<script>



function test(){

const auto = document.getElementById('auto').value
const display = document.getElementById('display')

$('#none').append(auto)

    for(i = 0; i<=15; i++){

let test = $('.text-start')[i]

const title = test.getAttribute('title')
    


    display.innerHTML += `
    
    <button onclick ="test2(${i})">${title}</button> <br>
    
    `

    }


}


function test2(num){
   let links = $('.text-start')[num]
    navigator.clipboard.writeText('https://embedstream.me'+links.getAttribute('href')+'-1');

}

    
</script>
</body>
</html>
